<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión | Innovare Barber Tech</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <style>
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px !important; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #9e9eae; cursor: pointer;
      font-size: 1.2rem; padding: 4px; line-height: 1;
    }
    .pw-toggle:hover { color: #00E5FF; }
  </style>
</head>
<body>
  <main class="login-page">
    <div class="login-card">
      <div style="text-align: center; margin-bottom: var(--spacing-lg);">
        <div style="font-size: 3rem; margin-bottom: var(--spacing-sm);">💈</div>
        <h1><span class="highlight">Innovare</span> Barber Tech</h1>
        <p class="login-subtitle">Inicia sesión para continuar</p>
      </div>
      
      <div class="login-error" id="login-error">Credenciales inválidas</div>
      
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Correo Electrónico</label>
          <input type="email" class="form-input" id="login-email" placeholder="tu@correo.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <div class="pw-wrap">
            <input type="password" class="form-input" id="login-password" placeholder="••••••••" required>
            <button type="button" class="pw-toggle" id="pw-toggle" tabindex="-1">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">Iniciar Sesión</button>
      </form>
      
      <div style="text-align: center; margin-top: var(--spacing-md);">
        <p>¿No tienes cuenta? <a href="#" id="show-register" style="color: var(--accent-color);">Regístrate aquí</a></p>
      </div>
      
      <div style="text-align: center; margin-top: var(--spacing-md); padding-top: var(--spacing-md); border-top: 1px solid #e8eaf0;">
        <a href="index.html" style="color: #6e6e7e; font-size: 0.85rem;">← Volver al Inicio</a>
      </div>
      
    </div>
  </main>

 <!-- 1. IMPORTANTE: Primero cargar Supabase desde internet -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- 2. Luego cargar tu archivo de configuración -->
  <script src="assets/js/supabase.js"></script>
  
  <script>
    // ===== REGISTRO Y LOGIN CON SUPABASE =====
    let isRegisterMode = false;
    
    // Mostrar/ocultar contraseña
    document.getElementById('pw-toggle').addEventListener('click', function() {
      const i = document.getElementById('login-password');
      const t = i.type === 'password' ? 'text' : 'password';
      i.type = t;
      this.textContent = t === 'password' ? '👁️' : '👁️‍🗨️';
    });

    // Toggle entre login y registro
    document.getElementById('show-register').addEventListener('click', (e) => {
      e.preventDefault();
      isRegisterMode = !isRegisterMode;
      toggleAuthMode();
    });

    function toggleAuthMode() {
      const form = document.getElementById('login-form');
      const subtitle = document.querySelector('.login-subtitle');
      const toggleLink = document.getElementById('show-register');
      
      if (isRegisterMode) {
        subtitle.textContent = 'Crea tu cuenta';
        toggleLink.textContent = '¿Ya tienes cuenta? Inicia sesión';
        form.innerHTML = `
          <div class="form-group">
            <label class="form-label">Nombre Completo</label>
            <input type="text" class="form-input" id="reg-nombre" placeholder="Tu nombre completo" required>
          </div>
          <div class="form-group">
            <label class="form-label">Teléfono (10 dígitos)</label>
            <input type="tel" class="form-input" id="reg-telefono" placeholder="2221175554" pattern="[0-9]{10}" maxlength="10" oninput="this.value=this.value.replace(/[^0-9]/g,'')" title="Solo 10 dígitos numéricos">
          </div>
          <div class="form-group">
            <label class="form-label">Correo Electrónico</label>
            <input type="email" class="form-input" id="reg-email" placeholder="tu@correo.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <div class="pw-wrap">
              <input type="password" class="form-input" id="reg-password" placeholder="Mínimo 6 caracteres" required minlength="6">
              <button type="button" class="pw-toggle" id="pw-toggle-reg" tabindex="-1">👁️</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Registrarse</button>
        `;
        
        // Agregar event listener para toggle de contraseña en registro
        const pwToggleReg = document.getElementById('pw-toggle-reg');
        if (pwToggleReg) {
          pwToggleReg.addEventListener('click', function() {
            const i = document.getElementById('reg-password');
            const t = i.type === 'password' ? 'text' : 'password';
            i.type = t;
            this.textContent = t === 'password' ? '👁️' : '👁️‍🗨️';
          });
        }
        
        form.onsubmit = handleRegister;
      } else {
        subtitle.textContent = 'Inicia sesión para continuar';
        toggleLink.textContent = '¿No tienes cuenta? Regístrate aquí';
        form.innerHTML = `
          <div class="form-group">
            <label class="form-label">Correo Electrónico</label>
            <input type="email" class="form-input" id="login-email" placeholder="tu@correo.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <div class="pw-wrap">
              <input type="password" class="form-input" id="login-password" placeholder="••••••••" required>
              <button type="button" class="pw-toggle" id="pw-toggle" tabindex="-1">👁️</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Iniciar Sesión</button>
        `;
        
        // Re-attach password toggle
        document.getElementById('pw-toggle').addEventListener('click', function() {
          const i = document.getElementById('login-password');
          const t = i.type === 'password' ? 'text' : 'password';
          i.type = t;
          this.textContent = t === 'password' ? '👁️' : '👁️‍🗨️';
        });
        
        form.onsubmit = handleLogin;
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      const nombre = document.getElementById('reg-nombre').value.trim();
      const telefono = document.getElementById('reg-telefono')?.value.trim() || '';
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      
      btn.disabled = true;
      btn.textContent = 'Registrando...';
      
      try {
        // Determinar rol: admin si el email contiene 'admin'
        var rol = (email === 'admin@innovarebarber.tech') ? 'admin' : 'cliente';
        
        // 1. Crear el usuario en Supabase Auth con user_metadata
        const { data, error } = await supabase.auth.signUp({
          email: email,
          password: password,
          options: {
            data: {
              nombre: nombre,
              telefono: telefono,
              rol: rol
            }
          }
        });

        if (error) throw error;

        // 2. Insertar datos en la tabla "usuarios" de Supabase
        if (data.user) {
          const { error: dbError } = await supabase
            .from('usuarios')
            .insert([{ 
                id: data.user.id,
                nombre: nombre,
                email: email,
                telefono: telefono,
                rol: rol,
                activo: false // Se activa cuando confirma email
              }]);
              
          if (dbError) throw dbError;
        }
        
        // 3. Indicar que debe confirmar el correo
        alert('✅ Registro exitoso. Te hemos enviado un correo de confirmación. Revisa tu bandeja de entrada (o spam) y haz clic en el enlace. Después podrás iniciar sesión.');
        isRegisterMode = false;
        toggleAuthMode();
      } catch(err) {
        alert('❌ Error al registrar: ' + err.message);
      }
      
      btn.disabled = false;
      btn.textContent = 'Registrarse';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      const errDiv = document.getElementById('login-error');
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-password').value;
      
      btn.disabled = true;
      btn.textContent = 'Ingresando...';
      errDiv.style.display = 'none';
      
      try {
        // 1. Intentar login
        const d = await InnovareDB.login(email, pass);
        const user = d.user;
        const token = d.token;
        
        // 2. Validar si el email está confirmado
        if (!user.email_confirmed_at) {
          errDiv.textContent = '❌ Debes confirmar tu correo electrónico primero. Revisa tu bandeja de entrada.';
          errDiv.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Iniciar Sesión';
          
          // Cerrar sesión porque Supabase igual autentica
          await supabase.auth.signOut();
          return;
        }
        
        // 3. Todo bien, loguear
        doLogin(user, token);
      } catch(err) {
        errDiv.textContent = '❌ Credenciales incorrectas o usuario no registrado.';
        errDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Iniciar Sesión';
      }
    }

    function doLogin(user, token) {
      const userMetadata = user.user_metadata || {};
      const userRole = userMetadata.rol || 'cliente';
      const userName = userMetadata.nombre || user.email?.split('@')[0] || 'Usuario';
      const userPhone = userMetadata.telefono || user.phone || '';
      
      // Crear objeto user con rol en la raíz para compatibilidad con localStorage
      const userData = {
        id: user.id || user.sub,
        email: user.email,
        nombre: userName,
        rol: userRole,
        telefono: userPhone
      };
      
      localStorage.setItem('innovare_token', token);
      localStorage.setItem('innovare_user', JSON.stringify(userData));
      
      // Actualizar activo=true en la tabla usuarios si ya confirmó
      (async function() {
        try {
          await supabase.from('usuarios').update({ activo: true }).eq('id', userData.id);
        } catch(e) { /* silent */ }
      })();
      
      window.location.href = userRole === 'admin' ? 'dashboard-admin.html' : 'index.html';
    }

    // Inicializar
    document.getElementById('login-form').onsubmit = handleLogin;
  </script>
</body>
</html>
