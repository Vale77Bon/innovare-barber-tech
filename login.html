<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión | Innovare Barber Tech</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <style>
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px !important; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #9e9eae; cursor: pointer;
      font-size: 1.2rem; padding: 4px; line-height: 1;
    }
    .pw-toggle:hover { color: #00E5FF; }
  </style>
</head>
<body>
  <main class="login-page">
    <div class="login-card">
      <div style="text-align: center; margin-bottom: var(--spacing-lg);">
        <div style="font-size: 3rem; margin-bottom: var(--spacing-sm);">💈</div>
        <h1><span class="highlight">Innovare</span> Barber Tech</h1>
        <p class="login-subtitle">Inicia sesión para continuar</p>
      </div>
      
      <div class="login-error" id="login-error">Credenciales inválidas</div>
      
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Correo Electrónico</label>
          <input type="email" class="form-input" id="login-email" placeholder="tu@correo.com" value="cliente@demo.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <div class="pw-wrap">
            <input type="password" class="form-input" id="login-password" placeholder="••••••••" value="innovare2026" required>
            <button type="button" class="pw-toggle" id="pw-toggle" tabindex="-1">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">Iniciar Sesión</button>
      </form>
      
      <div class="login-credentials">
        <p><strong>Credenciales de prueba (funcionan offline):</strong></p>
        <p>👑 <strong>Admin:</strong> <code>admin@innovarebarber.tech</code> / <code>innovare2026</code></p>
        <p>👤 <strong>Cliente:</strong> <code>cliente@demo.com</code> / <code>innovare2026</code></p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script>
    // ===== LOGIN OFFLINE + ONLINE =====
    const MOCK_USERS = [
      { id: 'admin-001', nombre: 'Admin Barber', email: 'admin@innovarebarber.tech', password: 'innovare2026', rol: 'admin', telefono: '2221175554' },
      { id: 'client-001', nombre: 'Cliente Demo', email: 'cliente@demo.com', password: 'innovare2026', rol: 'cliente', telefono: '5551001000' }
    ];

    // Mostrar/ocultar contraseña
    document.getElementById('pw-toggle').addEventListener('click', function() {
      const i = document.getElementById('login-password');
      const t = i.type === 'password' ? 'text' : 'password';
      i.type = t;
      this.textContent = t === 'password' ? '👁️' : '👁️‍🗨️';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errDiv = document.getElementById('login-error');
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-password').value;
      
      btn.disabled = true;
      btn.textContent = 'Ingresando...';
      errDiv.style.display = 'none';
      
      // Try online API first
      let loggedIn = false;
      try {
        const r = await fetch(window.location.origin + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pass })
        });
        if (r.ok) {
          const d = await r.json();
          doLogin(d.user, d.token);
          loggedIn = true;
        }
      } catch(e) { /* offline fallback */ }
      
      if (loggedIn) return;
      
      // OFFLINE MODE
      const user = MOCK_USERS.find(u => u.email === email && u.password === pass);
      if (!user) {
        errDiv.textContent = '❌ Usa: cliente@demo.com / innovare2026';
        errDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Iniciar Sesión';
        return;
      }
      const token = btoa(JSON.stringify({ id: user.id, email: user.email, rol: user.rol }));
      doLogin({ id: user.id, nombre: user.nombre, email: user.email, rol: user.rol, telefono: user.telefono }, token);
    });

    function doLogin(user, token) {
      localStorage.setItem('innovare_token', token);
      localStorage.setItem('innovare_user', JSON.stringify(user));
      window.location.href = user.rol === 'admin' ? 'dashboard-admin.html' : 'index.html';
    }
  </script>
</body>
</html>
