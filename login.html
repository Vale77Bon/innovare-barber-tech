<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión | Innovare Barber Tech</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <style>
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px !important; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #9e9eae; cursor: pointer;
      font-size: 1.2rem; padding: 4px; line-height: 1;
    }
    .pw-toggle:hover { color: #00E5FF; }
  </style>
</head>
<body>
  <main class="login-page">
    <div class="login-card">
      <div style="text-align: center; margin-bottom: var(--spacing-lg);">
        <div style="font-size: 3rem; margin-bottom: var(--spacing-sm);">💈</div>
        <h1><span class="highlight">Innovare</span> Barber Tech</h1>
        <p class="login-subtitle">Inicia sesión para continuar</p>
      </div>
      
      <div class="login-error" id="login-error">Credenciales inválidas</div>
      
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Correo Electrónico</label>
          <input type="email" class="form-input" id="login-email" placeholder="tu@correo.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <div class="pw-wrap">
            <input type="password" class="form-input" id="login-password" placeholder="••••••••" required>
            <button type="button" class="pw-toggle" id="pw-toggle" tabindex="-1">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">Iniciar Sesión</button>
      </form>
      
      <div style="text-align: center; margin-top: var(--spacing-md);">
        <p>¿No tienes cuenta? <a href="#" id="show-register" style="color: var(--accent-color);">Regístrate aquí</a></p>
      </div>
      
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script>
    // ===== REGISTRO Y LOGIN =====
    let isRegisterMode = false;
    
    // Mostrar/ocultar contraseña
    document.getElementById('pw-toggle').addEventListener('click', function() {
      const i = document.getElementById('login-password');
      const t = i.type === 'password' ? 'text' : 'password';
      i.type = t;
      this.textContent = t === 'password' ? '👁️' : '👁️‍🗨️';
    });

    // Toggle entre login y registro
    document.getElementById('show-register').addEventListener('click', (e) => {
      e.preventDefault();
      isRegisterMode = !isRegisterMode;
      toggleAuthMode();
    });

    function toggleAuthMode() {
      const form = document.getElementById('login-form');
      const subtitle = document.querySelector('.login-subtitle');
      const toggleLink = document.getElementById('show-register');
      
      if (isRegisterMode) {
        subtitle.textContent = 'Crea tu cuenta';
        toggleLink.textContent = '¿Ya tienes cuenta? Inicia sesión';
        form.innerHTML = `
          <div class="form-group">
            <label class="form-label">Nombre Completo</label>
            <input type="text" class="form-input" id="reg-nombre" placeholder="Tu nombre completo" required>
          </div>
          <div class="form-group">
            <label class="form-label">Correo Electrónico</label>
            <input type="email" class="form-input" id="reg-email" placeholder="tu@correo.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Teléfono</label>
            <input type="tel" class="form-input" id="reg-telefono" placeholder="222-123-4567" required>
          </div>
          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <div class="pw-wrap">
              <input type="password" class="form-input" id="reg-password" placeholder="Mínimo 6 caracteres" required minlength="6">
              <button type="button" class="pw-toggle" id="pw-toggle-reg" tabindex="-1">👁️</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Registrarse</button>
        `;
        
        // Agregar event listener para toggle de contraseña en registro
        const pwToggleReg = document.getElementById('pw-toggle-reg');
        if (pwToggleReg) {
          pwToggleReg.addEventListener('click', function() {
            const i = document.getElementById('reg-password');
            const t = i.type === 'password' ? 'text' : 'password';
            i.type = t;
            this.textContent = t === 'password' ? '👁️' : '👁️‍🗨️';
          });
        }
        
        form.onsubmit = handleRegister;
      } else {
        subtitle.textContent = 'Inicia sesión para continuar';
        toggleLink.textContent = '¿No tienes cuenta? Regístrate aquí';
        form.innerHTML = `
          <div class="form-group">
            <label class="form-label">Correo Electrónico</label>
            <input type="email" class="form-input" id="login-email" placeholder="tu@correo.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <div class="pw-wrap">
              <input type="password" class="form-input" id="login-password" placeholder="••••••••" required>
              <button type="button" class="pw-toggle" id="pw-toggle" tabindex="-1">👁️</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Iniciar Sesión</button>
        `;
        
        // Re-attach password toggle
        document.getElementById('pw-toggle').addEventListener('click', function() {
          const i = document.getElementById('login-password');
          const t = i.type === 'password' ? 'text' : 'password';
          i.type = t;
          this.textContent = t === 'password' ? '👁️' : '👁️‍🗨️';
        });
        
        form.onsubmit = handleLogin;
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      const nombre = document.getElementById('reg-nombre').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const telefono = document.getElementById('reg-telefono').value.trim();
      const password = document.getElementById('reg-password').value;
      
      btn.disabled = true;
      btn.textContent = 'Registrando...';
      
      try {
        const r = await fetch(window.location.origin + '/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, email, telefono, password })
        });
        
        if (r.ok) {
          const d = await r.json();
          alert('✅ Registro exitoso. Ahora inicia sesión.');
          isRegisterMode = false;
          toggleAuthMode();
        } else {
          const err = await r.json();
          alert('❌ Error: ' + (err.message || 'No se pudo registrar'));
        }
      } catch(e) {
        alert('❌ Error de conexión. Por favor intenta más tarde.');
      }
      
      btn.disabled = false;
      btn.textContent = 'Registrarse';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      const errDiv = document.getElementById('login-error');
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-password').value;
      
      btn.disabled = true;
      btn.textContent = 'Ingresando...';
      errDiv.style.display = 'none';
      
      try {
        const r = await fetch(window.location.origin + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pass })
        });
        
        if (r.ok) {
          const d = await r.json();
          doLogin(d.user, d.token);
        } else {
          const err = await r.json();
          errDiv.textContent = '❌ ' + (err.message || 'Credenciales inválidas');
          errDiv.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Iniciar Sesión';
        }
      } catch(e) {
        errDiv.textContent = '❌ Error de conexión. Verifica tu internet.';
        errDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Iniciar Sesión';
      }
    }

    function doLogin(user, token) {
      localStorage.setItem('innovare_token', token);
      localStorage.setItem('innovare_user', JSON.stringify(user));
      window.location.href = user.rol === 'admin' ? 'dashboard-admin.html' : 'index.html';
    }

    // Inicializar
    document.getElementById('login-form').onsubmit = handleLogin;
  </script>
</body>
</html>
