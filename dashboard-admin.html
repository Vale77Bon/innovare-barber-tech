<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Dashboard Admin | Innovare Barber Tech</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <style>
    .admin-page { padding-top:calc(70px+3rem); min-height:100vh; }
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:2rem; }
    .st { background:#fff; border:1px solid rgba(0,0,0,0.05); border-radius:1rem; padding:1.5rem; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
    .st .n { font-size:2rem; font-weight:700; color:#00a0b8; }
    .st .l { font-size:0.75rem; color:#6e6e7e; text-transform:uppercase; letter-spacing:1px; margin-top:4px; }
    .dg { display:grid; grid-template-columns:2fr 1fr; gap:2rem; }
    .sec { background:#fff; border:1px solid rgba(0,0,0,0.05); border-radius:1rem; padding:1.5rem; margin-bottom:1.5rem; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
    .sec h3 { color:#00a0b8; margin-bottom:1rem; }
    table { width:100%; border-collapse:collapse; }
    th { text-align:left; padding:0.5rem 0.75rem; font-size:0.65rem; text-transform:uppercase; letter-spacing:1px; color:#6e6e7e; border-bottom:1px solid #e8eaf0; }
    td { padding:0.5rem 0.75rem; border-bottom:1px solid #f0f0f4; font-size:0.85rem; color:#1a1a2e; }
    tr:hover td { background:#f8f9fc; }
    .badge-st { padding:2px 10px; border-radius:12px; font-size:0.6rem; font-weight:600; text-transform:uppercase; }
    .bg-green { background:rgba(0,200,83,0.12); color:#00c853; }
    .bg-yellow { background:rgba(255,214,0,0.15); color:#b8a000; }
    .bg-red { background:rgba(255,23,68,0.1); color:#ff1744; }
    .bg-cyan { background:rgba(0,229,255,0.12); color:#0099aa; }
    .qbtn { padding:1rem; background:#f5f6fa; border:1px solid #e0e0ea; border-radius:0.5rem; text-align:center; cursor:pointer; transition:all 0.3s; font-family:Inter; color:#1a1a2e; font-size:0.85rem; }
    .qbtn:hover { background:#fff; border-color:#00E5FF; }
    .qbtn .ic { display:block; font-size:1.5rem; margin-bottom:4px; }
    .qa { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; }
    .act-btn { padding:4px 8px; font-size:0.7rem; border-radius:4px; border:1px solid #e0e0ea; background:#f5f6fa; cursor:pointer; margin:2px; }
    .act-btn:hover { background:#00E5FF; color:#1a1a2e; border-color:#00E5FF; }
    @media(max-width:1024px){ .dg{grid-template-columns:1fr} .stats{grid-template-columns:repeat(2,1fr)} }
    @media(max-width:480px){ .stats{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>
  <main class="admin-page">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;">
      <div><h1>📊 Dashboard</h1><p style="color:#6e6e7e;margin:0;">Panel de administración</p></div>
    </div>
    <div class="stats" id="srow">
      <div class="st"><div class="n" id="s-total">0</div><div class="l">Total Citas</div></div>
      <div class="st"><div class="n" id="s-pendientes">0</div><div class="l">Pendientes</div></div>
      <div class="st"><div class="n" id="s-completadas">0</div><div class="l">Completadas</div></div>
      <div class="st"><div class="n" id="s-revenue">$0</div><div class="l">Ingresos</div></div>
    </div>
  <div class="dg">
    <div>
      <div class="sec">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
          <h3 style="margin:0;">📋 Todas las Citas</h3>
          <a href="reservas.html" class="btn btn-sm btn-primary">+ Nueva</a>
        </div>
        <div style="overflow-x:auto;" id="apt-list"><div class="loading-spinner"></div></div>
      </div>
      
      <div class="sec">
        <h3>📊 Ventas de la Semana</h3>
        <canvas id="salesChart" style="max-height:300px;"></canvas>
      </div>
    </div>
    <div>
      <div class="sec">
        <h3>⚡ Acciones</h3>
        <div class="qa">
          <button class="qbtn" onclick="window.location='reservas.html'"><span class="ic">📅</span>Nueva Cita</button>
          <button class="qbtn" onclick="loadData()"><span class="ic">🔄</span>Actualizar</button>
          <button class="qbtn" onclick="window.location='escaneo-ar.html'"><span class="ic">🪞</span>Smart Mirror</button>
          <button class="qbtn" onclick="window.location='mis-citas.html'"><span class="ic">📋</span>Mis Citas</button>
        </div>
      </div>
      
      <div class="sec">
        <h3>💰 Ingresos por Tipo</h3>
        <canvas id="revenueChart" style="max-height:250px;"></canvas>
      </div>
    </div>
  </div>
  </main>
  <div id="footer-placeholder"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    (function(){
      var u = JSON.parse(localStorage.getItem('innovare_user')||'{}');
      var userRole = u.user_metadata?.rol || u.rol || 'cliente';
      if(!localStorage.getItem('innovare_token')||userRole!=='admin') window.location.href='login.html';
      loadData();
    })();

    function fCur(n){ return '$'+parseFloat(n).toFixed(2); }

    function loadData(){
      var citas = JSON.parse(localStorage.getItem('innovare_appointments')||'[]');
      citas.sort(function(a,b){ return new Date(b.createdAt||0)-new Date(a.createdAt||0); });

      var total=citas.length,
          pend=citas.filter(function(c){return c.estado==='pendiente'||c.estado==='confirmada';}).length,
          comp=citas.filter(function(c){return c.estado==='completada';}).length,
          rev=citas.filter(function(c){return c.paymentStatus==='Completado';}).reduce(function(s,c){return s+(c.total||c.price||0);},0);

      document.getElementById('s-total').textContent=total;
      document.getElementById('s-pendientes').textContent=pend;
      document.getElementById('s-completadas').textContent=comp;
      document.getElementById('s-revenue').textContent=fCur(rev);

      var list=document.getElementById('apt-list');
      if(!citas.length){ list.innerHTML='<p style="color:#6e6e7e;text-align:center;padding:2rem;">Sin citas</p>'; return; }

      var map={confirmada:'bg-green',pendiente:'bg-yellow',cancelada:'bg-red',completada:'bg-cyan'};
      var h='<table><thead><tr><th>Cliente</th><th>Fecha</th><th>Hora</th><th>Barbero</th><th>Servicio</th><th>Precio</th><th>Estado</th><th></th></tr></thead><tbody>';
      citas.forEach(function(c){
        var st=c.estado||'pendiente';
        h+='<tr><td>👤 '+(c.clientName||'Cliente')+'</td><td>'+c.date+'</td><td>'+c.time+'</td><td>'+(c.barber_name||'—')+'</td><td>'+(c.service_name||'—')+'</td><td>'+fCur(c.price||0)+'</td><td><span class="badge-st '+(map[st]||'bg-yellow')+'">'+st+'</span></td>';
        h+='<td>';
        if(st!=='cancelada'&&st!=='completada') h+='<button class="act-btn" onclick="updateStatus('+c.id+',\'completada\')">✓</button>';
        if(st!=='cancelada') h+='<button class="act-btn" onclick="updateStatus('+c.id+',\'cancelada\')" style="color:#ff1744;">✕</button>';
        h+='</td></tr>';
      });
      h+='</tbody></table>';
      list.innerHTML=h;
    }

    function updateStatus(id,status){
      var citas=JSON.parse(localStorage.getItem('innovare_appointments')||'[]');
      var idx=citas.findIndex(function(c){return c.id===id;});
      if(idx>=0){ citas[idx].estado=status; localStorage.setItem('innovare_appointments',JSON.stringify(citas)); loadData(); }
    }

    // ===== GRÁFICAS DE VENTAS =====
    function loadCharts() {
      // Datos de ejemplo (después se conectarán a Supabase)
      var days = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
      var servicesData = [1200, 1900, 800, 2100, 2400, 3200, 1800];
      var productsData = [300, 500, 200, 600, 800, 1200, 400];

      // Gráfica de ventas de la semana
      var ctx1 = document.getElementById('salesChart');
      if (ctx1) {
        new Chart(ctx1, {
          type: 'bar',
          data: {
            labels: days,
            datasets: [{
              label: 'Servicios',
              data: servicesData,
              backgroundColor: 'rgba(0, 229, 255, 0.8)',
              borderColor: 'rgba(0, 229, 255, 1)',
              borderWidth: 1
            }, {
              label: 'Productos',
              data: productsData,
              backgroundColor: 'rgba(0, 200, 83, 0.8)',
              borderColor: 'rgba(0, 200, 83, 1)',
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'top',
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: {
                  callback: function(value) {
                    return '$' + value;
                  }
                }
              }
            }
          }
        });
      }

      // Gráfica de ingresos por tipo
      var ctx2 = document.getElementById('revenueChart');
      if (ctx2) {
        var totalServices = servicesData.reduce((a, b) => a + b, 0);
        var totalProducts = productsData.reduce((a, b) => a + b, 0);
        
        new Chart(ctx2, {
          type: 'doughnut',
          data: {
            labels: ['Servicios', 'Productos'],
            datasets: [{
              data: [totalServices, totalProducts],
              backgroundColor: [
                'rgba(0, 229, 255, 0.8)',
                'rgba(0, 200, 83, 0.8)'
              ],
              borderColor: [
                'rgba(0, 229, 255, 1)',
                'rgba(0, 200, 83, 1)'
              ],
              borderWidth: 2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'bottom',
              }
            }
          }
        });
      }
    }

    // Cargar gráficas después de cargar los datos
    setTimeout(loadCharts, 500);
  </script>
</body>
</html>
