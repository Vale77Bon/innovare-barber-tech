version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: innovare-barber-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: innovare_barber
      POSTGRES_USER: innovare_user
      POSTGRES_PASSWORD: innovare_pass_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U innovare_user -d innovare_barber"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: