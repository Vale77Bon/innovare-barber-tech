<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Mis Pedidos | Innovare Barber Tech</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <style>
    .orders-page { padding-top: calc(70px + 2rem); min-height: 100vh; }
    .orders-container { max-width: 900px; margin: 0 auto; padding: 0 var(--spacing-xl) var(--spacing-xxl); }
    .orders-container h1 { margin-bottom: 0.5rem; }
    .orders-container > p { color: #6e6e7e; margin-bottom: var(--spacing-xl); }
    .order-card {
      background: #fff; border: 1px solid rgba(0,0,0,0.06); border-radius: var(--radius-lg);
      margin-bottom: var(--spacing-lg); overflow: hidden; box-shadow: var(--shadow-sm);
      transition: all 0.3s;
    }
    .order-card:hover { box-shadow: var(--shadow-md); }
    .order-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: var(--spacing-md) var(--spacing-lg);
      background: #f8f9fc; border-bottom: 1px solid #e8eaf0;
      cursor: pointer;
    }
    .order-header-left { display: flex; align-items: center; gap: var(--spacing-md); }
    .order-id { font-weight: 700; color: #1a1a2e; font-size: 0.9rem; }
    .order-date { color: #6e6e7e; font-size: 0.8rem; }
    .order-status {
      padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 600;
    }
    .status-completado { background: rgba(0,200,83,0.12); color: #00c853; }
    .status-pendiente { background: rgba(255,214,0,0.15); color: #b8a000; }
    .status-cancelado { background: rgba(255,23,68,0.1); color: #ff1744; }
    .order-total-header { font-weight: 700; color: #00a0b8; font-size: 1.1rem; }
    .expand-icon { font-size: 0.8rem; color: #6e6e7e; transition: transform 0.3s; }
    .order-card.expanded .expand-icon { transform: rotate(180deg); }
    .order-body { display: none; padding: var(--spacing-lg); }
    .order-card.expanded .order-body { display: block; }
    .order-tracking {
      display: flex; align-items: center; gap: 0; margin-bottom: var(--spacing-lg);
      padding: var(--spacing-md); background: #f5f6fa; border-radius: var(--radius-md);
    }
    .tracking-step { flex: 1; text-align: center; position: relative; }
    .tracking-step .ts-icon { font-size: 1.5rem; display: block; margin-bottom: 4px; }
    .tracking-step .ts-label { font-size: 0.7rem; color: #6e6e7e; display: block; }
    .tracking-step.completed .ts-icon { filter: none; }
    .tracking-step.completed .ts-label { color: #00c853; font-weight: 600; }
    .tracking-line {
      position: absolute; top: 12px; right: -50%; width: 100%; height: 2px;
      background: #e0e0ea; z-index: 0;
    }
    .tracking-step.completed .tracking-line { background: #00c853; }
    .order-items { margin-bottom: var(--spacing-lg); }
    .order-item {
      display: flex; align-items: center; gap: var(--spacing-md);
      padding: var(--spacing-sm) 0; border-bottom: 1px solid #f0f0f4;
    }
    .order-item-img { font-size: 2rem; }
    .order-item-info { flex: 1; }
    .order-item-name { font-weight: 600; font-size: 0.9rem; }
    .order-item-qty { font-size: 0.8rem; color: #6e6e7e; }
    .order-item-price { font-weight: 600; color: #1a1a2e; }
    .order-summary {
      background: #f8f9fc; border-radius: var(--radius-md); padding: var(--spacing-md);
    }
    .order-summary-line { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.85rem; color: #4a4a5e; }
    .order-summary-total { border-top: 2px solid #e0e0ea; margin-top: 8px; padding-top: 8px; font-weight: 700; font-size: 1rem; color: #1a1a2e; }
    .no-orders { text-align: center; padding: 4rem 2rem; }
    .no-orders .big-icon { font-size: 4rem; margin-bottom: 1rem; }
    @media(max-width:768px){
      .orders-page { padding-top: calc(70px + 1rem); }
      .orders-container { padding: 0 0.75rem var(--spacing-xl); }
      .order-header { flex-direction: column; align-items: flex-start; gap: 0.5rem; padding: 1rem; }
      .order-body { padding: 1rem; }
      .order-item { padding: 0.75rem 0; }
      .tracking-step .ts-icon { font-size: 1.2rem; }
      .tracking-step .ts-label { font-size: 0.65rem; }
    }
    @media(max-width:480px){
      .order-header-left { flex-direction: column; align-items: flex-start; gap: 0.25rem; }
      .order-total-header { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>
  
  <main class="orders-page">
    <div class="orders-container">
      <h1>📦 <span class="highlight">Mis Pedidos</span></h1>
      <p>Historial de tus compras en la tienda</p>
      <div id="orders-list">
        <div class="loading-spinner" style="text-align: center; padding: 3rem;">Cargando pedidos...</div>
      </div>
    </div>
  </main>
  
  <div id="footer-placeholder"></div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/main.js"></script>
  
  <script>
    async function loadOrders() {
      const list = document.getElementById('orders-list');
      
      // 1. Verificar si el usuario está logueado
      const userString = localStorage.getItem('innovare_user');
      if (!userString) {
        list.innerHTML = `
          <div class="no-orders">
            <div class="big-icon">🔒</div>
            <h3>Inicia sesión para ver tus pedidos</h3>
            <p style="color:#6e6e7e;">Necesitas una cuenta para acceder a tu historial.</p>
            <a href="login.html" class="btn btn-primary" style="margin-top:1rem;">Ir a Iniciar Sesión</a>
          </div>`;
        return;
      }
      
      const user = JSON.parse(userString);
      
      try {
        // Asegurarnos que la variable 'sb' de supabase.js existe
        if (!window.sb) {
            throw new Error("Supabase no está inicializado. Verifica tu archivo supabase.js.");
        }

        // 2. Extraer los pedidos REALES desde Supabase
        const { data: orders, error } = await sb
          .from('pedidos')
          .select('*')
          .eq('cliente_id', user.id)
          .order('created_at', { ascending: false });
          
        if (error) throw error;

        // Si no tiene pedidos en la base de datos
        if (!orders || orders.length === 0) {
          list.innerHTML = `
            <div class="no-orders">
              <div class="big-icon">🛒</div>
              <h3>No tienes pedidos aún</h3>
              <p style="color:#6e6e7e;">Visita nuestra tienda para comprar productos premium</p>
              <a href="tienda.html" class="btn btn-primary" style="margin-top:1rem;">Ir a la Tienda</a>
            </div>`;
          return;
        }

        // 3. Renderizar cada pedido dinámicamente
        list.innerHTML = orders.map(function(o) {
          // Lógica de estados
          let statusClass = 'status-completado';
          let statusText = 'Entregado';
          const isPending = o.estado === 'pendiente';
          const isCanceled = o.estado === 'cancelado';
          
          if (isPending) { statusClass = 'status-pendiente'; statusText = 'Pendiente de Pago'; }
          if (isCanceled) { statusClass = 'status-cancelado'; statusText = 'Cancelado'; }
          
          // Formateo de fechas
          const fecha = new Date(o.created_at);
          const fechaStr = fecha.toLocaleDateString('es-MX', { year:'numeric', month:'long', day:'numeric' });
          const horaStr = fecha.toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' });
          
          // Iconos de pago
          const paymentNames = { stripe:'💳 Stripe', paypal:'🅿️ PayPal', mercado:'🟢 Mercado Pago', oxxo:'🏪 OXXO', spei:'🏦 SPEI' };
          const paymentIcon = paymentNames[o.metodo_pago] || '💳 ' + (o.metodo_pago ? o.metodo_pago.toUpperCase() : 'TARJETA');
          
          // Cálculo de items, subtotal y envío
          const items = (o.detalles && o.detalles.items) ? o.detalles.items : [];
          const subtotal = items.reduce((sum, item) => sum + (item.precio * (item.qty || 1)), 0);
          let envio = o.total - subtotal;
          if (envio < 0) envio = 0;
          
          // Render de los productos comprados
          const itemsHtml = items.map(function(item) {
            return `<div class="order-item">
                      <div class="order-item-img">${item.img || '📦'}</div>
                      <div class="order-item-info">
                        <div class="order-item-name">${item.nombre}</div>
                        <div class="order-item-qty">Cant: ${item.qty || 1}</div>
                      </div>
                      <div class="order-item-price">$${(item.precio * (item.qty || 1)).toFixed(2)}</div>
                    </div>`;
          }).join('');

          // ALERTA NARANJA PARA OXXO Y SPEI PENDIENTES
          let referenciaHtml = '';
          if (isPending && o.referencia_pago) {
            const tipoRef = o.metodo_pago === 'spei' ? 'CLABE para Transferencia' : 'Dicta este código al cajero (OXXO)';
            referenciaHtml = `
              <div style="background: #fff3e0; border-left: 4px solid #ff9800; padding: 1rem; margin-bottom: 1rem; border-radius: 4px;">
                <p style="margin: 0; color: #e65100; font-size: 0.95rem; font-weight: bold;">⚠️ Falta completar tu pago</p>
                <p style="margin: 5px 0 0; font-size: 0.9rem; color: #555;">${tipoRef}: <br>
                <span style="font-size: 1.3rem; font-weight: 900; letter-spacing: 2px; color: #000;">${o.referencia_pago}</span></p>
              </div>
            `;
          }

          // Lógica de Tracking de Envío
          const tPago = isPending ? '' : 'completed';
          const tPrep = (!isPending && !isCanceled) ? 'completed' : '';
          const tEnv  = (!isPending && !isCanceled) ? 'completed' : ''; 
          const tEnt  = (!isPending && !isCanceled) ? 'completed' : '';

          // ID Corto visual (Ej: UUID d0bf16cd... se convierte en D0BF16CD)
          const shortId = o.id ? o.id.split('-')[0].toUpperCase() : '1A2B3C';

          return `
            <div class="order-card" onclick="toggleOrder(this)">
              <div class="order-header">
                <div class="order-header-left">
                  <span class="order-id">#${shortId}</span>
                  <span class="order-date">${fechaStr} - ${horaStr}</span>
                  <span class="order-status ${statusClass}">${statusText}</span>
                </div>
                <div style="display:flex;align-items:center;gap:1rem;">
                  <span class="order-total-header">$${Number(o.total || 0).toFixed(2)}</span>
                  <span class="expand-icon">▼</span>
                </div>
              </div>
              <div class="order-body" onclick="event.stopPropagation()">
                ${referenciaHtml}
                <div class="order-tracking">
                  <div class="tracking-step completed"><span class="ts-icon">🛒</span><span class="ts-label">Pedido</span><span class="tracking-line"></span></div>
                  <div class="tracking-step ${tPago}"><span class="ts-icon">💳</span><span class="ts-label">Pago</span><span class="tracking-line"></span></div>
                  <div class="tracking-step ${tPrep}"><span class="ts-icon">📦</span><span class="ts-label">Preparando</span><span class="tracking-line"></span></div>
                  <div class="tracking-step ${tEnv}"><span class="ts-icon">🚚</span><span class="ts-label">Envío</span><span class="tracking-line"></span></div>
                  <div class="tracking-step ${tEnt}"><span class="ts-icon">✅</span><span class="ts-label">Entregado</span></div>
                </div>
                <div class="order-items">${itemsHtml}</div>
                <div class="order-summary">
                  <div class="order-summary-line"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
                  <div class="order-summary-line"><span>Envío</span><span>${envio <= 0 ? 'Gratis' : '$' + envio.toFixed(2)}</span></div>
                  <div class="order-summary-line"><span>Método de pago</span><span>${paymentIcon}</span></div>
                  <div class="order-summary-line order-summary-total"><span>Total</span><span style="color:#00a0b8;">$${Number(o.total || 0).toFixed(2)}</span></div>
                </div>
              </div>
            </div>`;
        }).join('');
        
      } catch(err) {
        console.error("Error al cargar pedidos de Supabase:", err);
        list.innerHTML = '<p style="color:red;text-align:center;padding:2rem;">Hubo un error al sincronizar tus pedidos con el servidor. Verifica tu conexión a internet o actualiza la página.</p>';
      }
    }
    
    // Llamar a la función principal al cargar la pantalla
    document.addEventListener('DOMContentLoaded', loadOrders);
    
    // Función para abrir/cerrar los detalles del pedido
    function toggleOrder(el) {
      el.classList.toggle('expanded');
    }
  </script>
</body>
</html>
